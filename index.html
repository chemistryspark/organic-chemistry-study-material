
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Chemistry Spark | Free Chemistry Study Material</title>

<meta name="description" content="Free chemistry notes for NEET, IIT-JEE, MSc entrance exams by Sudhir Nama.">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
}

nav{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
z-index:999;
}

.logo{
font-weight:600;
font-size:20px;
}

.search{
padding:7px 12px;
border-radius:20px;
border:none;
outline:none;
}

.toggle{
cursor:pointer;
font-size:18px;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:36px;
margin-bottom:10px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.1);
border-radius:15px;
padding:20px;
backdrop-filter:blur(10px);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card h3{
margin-bottom:10px;
}

.btn{
display:inline-block;
margin-top:10px;
padding:7px 14px;
border-radius:20px;
background:#3fb9ff;
color:white;
text-decoration:none;
}

.article-page{
max-width:900px;
margin:40px auto;
padding:25px;
background:rgba(255,255,255,0.08);
border-radius:15px;
display:none;
}

.article-page a{
color:#4db8ff;
}

footer{
margin-top:60px;
padding:25px;
text-align:center;
background:rgba(255,255,255,0.05);
}

.dark{
background:#0e1117;
}

</style>

<script type="application/ld+json">
{
"@context":"https://schema.org",
"@type":"Person",
"name":"Sudhir Nama",
"url":"https://sudhirnama.in",
"jobTitle":"Chemistry Author and Educator"
}
</script>

</head>

<body>

<nav>

<div class="logo">⚗ Chemistry Spark</div>

<input class="search" id="search" placeholder="Search topic">

<div class="toggle" onclick="toggleMode()">🌙</div>

</nav>

<section class="hero">

<h1>Free Chemistry Study Material</h1>

<p>NEET • IIT-JEE • MSc Entrance</p>

</section>

<div id="articles" class="container"></div>

<div id="articlePage" class="article-page">

<h1 id="articleTitle"></h1>

<div id="content"></div>

</div>

<footer>

<p><strong>Sudhir Nama</strong></p>

<p>Founder – Chemistry Spark</p>

<p><a href="https://sudhirnama.in" style="color:#4db8ff;">Official Website</a></p>

</footer>

<script>

const repo="chemistryspark/organic-chemistry-study-material"

async function loadArticles(){

const url=`https://api.github.com/repos/${repo}/contents/`

const res=await fetch(url)

const data=await res.json()

const container=document.getElementById("articles")

data.forEach(file=>{

if(file.name.endsWith(".md")){

const name=file.name.replace(".md","")

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<h3>🧪 ${name.replace(/-/g," ")}</h3>

<p>Chemistry study article</p>

<a class="btn" href="?article=${name}">Open</a>

`

container.appendChild(card)

}

})

}

loadArticles()

const params=new URLSearchParams(window.location.search)

const article=params.get("article")

if(article){

document.getElementById("articles").style.display="none"

document.getElementById("articlePage").style.display="block"

document.getElementById("articleTitle").innerText=article.replace(/-/g," ")

fetch(article+".md")

.then(res=>res.text())

.then(text=>{

document.getElementById("content").innerHTML=marked.parse(text)

})

}

document.getElementById("search").addEventListener("keyup",function(){

let filter=this.value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{

card.style.display=card.innerText.toLowerCase().includes(filter)?"block":"none"

})

})

function toggleMode(){

document.body.classList.toggle("dark")

}

</script>

</body>
</html>
